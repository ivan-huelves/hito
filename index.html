<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hito — GPX + puntos de interés</title>

    <!-- Tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Estilos propios -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- Botón para abrir el menú en móvil -->
    <button id="menuToggle" aria-label="Abrir menú">☰</button>
    <div id="backdrop"></div>

    <aside id="sidebar">
        <button id="sidebarClose" class="sidebar-close" aria-label="Cerrar menú">✕</button>

        <div class="brand">
            <h1>Hito</h1>
            <span class="tagline">gpx + puntos de interés</span>
        </div>

        <div>
            <label class="field-label" for="gpxFile">1 · Archivo de ruta</label>
            <input type="file" id="gpxFile" accept=".gpx">
        </div>

        <div>
            <label class="field-label" for="radius">2 · Radio de búsqueda</label>
            <select id="radius">
                <option value="3000">3 km</option>
                <option value="5000" selected>5 km</option>
                <option value="10000">10 km</option>
                <option value="15000">15 km</option>
                <option value="20000">20 km</option>
            </select>
        </div>

        <div class="filter-section">
            <div class="filter-head">
                <strong>3 · Filtros</strong>
                <button id="toggleAll" class="filter-toggle-all">marcar / quitar todo</button>
            </div>
            <label><input type="checkbox" id="chk-aguabeber" checked> 💧 Agua potable</label>
            <label><input type="checkbox" id="chk-servicios"> 🚽 Aseos / Baños</label>
            <label><input type="checkbox" id="chk-ducha"> 🚿 Duchas / Baños públicos</label>
            <label><input type="checkbox" id="chk-termas"> ♨️ Termas naturales</label>
            <label><input type="checkbox" id="chk-camping"> ⛺ Camping</label>
            <label><input type="checkbox" id="chk-refugio" checked> 🛖 Refugios y cabañas</label>
            <label><input type="checkbox" id="chk-comida" checked> 🛒 Comida y súper</label>
            <label><input type="checkbox" id="chk-picnic"> 🥪 Picnic y cocinas</label>
            <label><input type="checkbox" id="chk-cascada"> 🌊 Cascadas</label>
            <label><input type="checkbox" id="chk-belleza"> 📸 Vistas y cimas</label>
            <label><input type="checkbox" id="chk-cultura"> 🏛️ Cultura y castillos</label>
            <label><input type="checkbox" id="chk-biblioteca"> 📚 Bibliotecas</label>
            <label><input type="checkbox" id="chk-bicicleta"> 🚲 Taller de bicis</label>
            <label><input type="checkbox" id="chk-atm"> 🏧 Cajeros ATM</label>
        </div>

        <button id="btnSearch" class="btn-primary">Escanear ruta</button>
        <div id="status" class="status">Esperando archivo…</div>
        <div id="summary" class="summary"></div>
        <button id="btnDownload" class="btn-outline" disabled>Descargar GPX con puntos de interés</button>

        <footer class="sidebar-footer">
            © 2026 Iván Huelves Illas —
            <a href="https://github.com/ivan-huelves" target="_blank" rel="noopener">GitHub</a> —
            <a href="https://www.linkedin.com/in/TU-USUARIO" target="_blank" rel="noopener">LinkedIn</a>
        </footer>
    </aside>

    <div id="map"></div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Lógica propia -->
    <script src="script.js"></script>
</body>
</html>
